<!doctype html>
<html><head>
<meta charset="utf-8"/>
<title>Botless Studio</title>
<link rel="icon" href="../../assets/logo-mark.svg"/>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  html,body,#root { height:100%; }
  body { margin:0; overflow:hidden; }
  @keyframes breathe { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-3px) scale(1.015); } }
  @keyframes dot { 0%,100% { transform: translateY(0); opacity:0.4; } 50% { transform: translateY(-6px); opacity:1; } }
</style>
</head><body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel">
const { useState } = React;
const AGENTS = [
  { id:'aur_a8f2', name:'Aurora Cream',     status:'ready'   },
  { id:'srx_2200', name:'SRX-200',          status:'rigging' },
  { id:'kit_kbd1', name:'Kit Keyboard',     status:'ready'   },
  { id:'orb_lamp', name:'Orb Lamp',         status:'syncing' },
  { id:'pep_mil',  name:'Pepper Mill',      status:'ready'   },
  { id:'fld_cam',  name:'Field Camera',     status:'offline' },
];
function App() {
  const [activeId, setActiveId] = useState(AGENTS[0].id);
  const [state, setState] = useState('idle');
  const [busy, setBusy] = useState(false);
  const agent = AGENTS.find(a=>a.id===activeId);
  const onSend = (text) => {
    setBusy(true); setState('thinking');
    setTimeout(()=>{ setState('talking'); }, 900);
    setTimeout(()=>{ setBusy(false); setState('idle'); }, 2400);
  };
  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'#0A0A0B'}}>
      <Topbar/>
      <div style={{flex:1,display:'flex',minHeight:0}}>
        <WardSidebar agents={AGENTS} activeId={activeId} onSelect={setActiveId}/>
        <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
          <OperatingTable agent={agent} state={state} onState={setState}/>
          <Composer onSend={onSend} busy={busy}/>
        </div>
        <VitalsPanel agent={agent}/>
      </div>
      <StatusBar state={state} agent={agent}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
